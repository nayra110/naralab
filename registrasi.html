<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naralab - Daftar</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f0;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 700px;
            background: linear-gradient(145deg, #6A00FF 0%, #8B3DFF 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(106, 0, 255, 0.3);
            border-radius: 20px;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        .login-container::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 6s ease-in-out infinite;
        }

        .particle-1 {
            width: 40px;
            height: 40px;
            top: 15%;
            left: 10%;
            animation-delay: 0s;
        }

        .particle-2 {
            width: 25px;
            height: 25px;
            bottom: 20%;
            right: 15%;
            animation-delay: 2s;
        }

        .particle-3 {
            width: 15px;
            height: 15px;
            top: 30%;
            right: 20%;
            animation-delay: 4s;
        }

        .logo-small {
            font-size: 34px;
            color: #FFFFFF;
            margin-bottom: 8px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 1;
            position: relative;
        }

        .page-title {
            color: #FFFFFF;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 3px;
            z-index: 1;
            position: relative;
        }

        .page-title span {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 18px;
            z-index: 1;
            position: relative;
        }

        .form-container {
            width: 100%;
            max-width: 280px;
            z-index: 1;
            position: relative;
        }

        .input-group {
            position: relative;
            margin-bottom: 10px;
        }

        .input-group i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #FFFFFF;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: #FFFFFF;
            border: none;
            border-radius: 10px;
            color: #6A00FF;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 3px;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .divider-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 2px;
            margin: 14px 0;
            z-index: 1;
            position: relative;
            text-align: center;
        }

        .divider-text::before,
        .divider-text::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            vertical-align: middle;
            margin: 0 8px;
        }

        .btn-google {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #FFFFFF;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-google i {
            font-size: 18px;
            color: #FFFFFF;
        }

        .register-link {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 300;
            margin-top: 14px;
            z-index: 1;
            position: relative;
            text-align: center;
        }

        .register-link a {
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .message {
            font-size: 12px;
            font-weight: 300;
            margin-top: 6px;
            text-align: center;
            min-height: 18px;
            z-index: 1;
            position: relative;
        }

        .message.error {
            color: #ff6b6b;
        }

        .message.success {
            color: #51cf66;
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(15px, -20px) scale(1.2);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                max-height: 100vh;
                border-radius: 0;
                padding: 25px 15px;
                max-width: 100%;
            }
            .page-title {
                font-size: 22px;
            }
            .form-container {
                max-width: 260px;
            }
            .logo-small {
                font-size: 28px;
            }
            .input-group input {
                padding: 9px 10px 9px 34px;
                font-size: 12px;
            }
            .btn-login {
                padding: 10px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
        <div class="particle particle-3"></div>

        <i class="fas fa-flask logo-small"></i>
        <h1 class="page-title">Daftar <span>Akun</span></h1>
        <p class="subtitle">• Buat Akun Baru •</p>

        <div class="form-container">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email (Gmail)">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>

            <div class="message" id="message"></div>
            <button class="btn-login" id="submitBtn">Daftar</button>

            <div class="divider-text">atau</div>
            <button class="btn-google" id="googleBtn">
                <i class="fab fa-google"></i>
                Daftar dengan Google
            </button>

            <p class="register-link">
                Sudah punya akun? <a href="login.html">Login sekarang</a>
            </p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { 
            getAuth, 
            createUserWithEmailAndPassword,
            GoogleAuthProvider,
            signInWithPopup,
            onAuthStateChanged
        } from "firebase/auth";
        import { getDatabase, ref, set, get } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyCp3MPtlE7vUua7UwD9gjRlDeHeg7KWUk0",
            authDomain: "naralab-1ec88.firebaseapp.com",
            databaseURL: "https://naralab-1ec88-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "naralab-1ec88",
            storageBucket: "naralab-1ec88.firebasestorage.app",
            messagingSenderId: "620262646867",
            appId: "1:620262646867:web:8e6728f597c794e55992a6",
            measurementId: "G-ERY5XFD9LC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const googleBtn = document.getElementById('googleBtn');
        const message = document.getElementById('message');

        // Daftar dengan email/password
        submitBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const username = usernameInput.value.trim();

            if (!email || !password || !username) {
                showMessage('Semua field wajib diisi!', 'error');
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                await set(ref(db, 'users/' + user.uid), {
                    username: username,
                    email: email,
                    createdAt: new Date().toISOString()
                });
                
                showMessage('Akun berhasil dibuat! Mengarahkan...', 'success');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 2000);
            } catch (error) {
                let errorMessage = 'Terjadi kesalahan. Silakan coba lagi.';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'Email sudah terdaftar. Silakan login.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Format email tidak valid.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Password minimal 6 karakter.';
                        break;
                }
                showMessage(errorMessage, 'error');
            }
        });

        // Daftar dengan Google
        googleBtn.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                const userRef = ref(db, 'users/' + user.uid);
                const snapshot = await get(userRef);
                
                if (!snapshot.exists()) {
                    await set(userRef, {
                        username: user.displayName || 'User Google',
                        email: user.email,
                        createdAt: new Date().toISOString(),
                        authProvider: 'google'
                    });
                }
                
                showMessage('Pendaftaran Google berhasil! Mengarahkan...', 'success');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 2000);
            } catch (error) {
                let errorMessage = 'Pendaftaran Google gagal.';
                if (error.code === 'auth/popup-closed-by-user') {
                    errorMessage = 'Popup ditutup. Silakan coba lagi.';
                }
                showMessage(errorMessage, 'error');
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
            setTimeout(() => {
                if (message.textContent === text) {
                    message.textContent = '';
                    message.className = 'message';
                }
            }, 3000);
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log('User sudah login:', user.email);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                submitBtn.click();
            }
        });
    </script>
</body>
</html>
