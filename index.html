<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naralab - Splash Screen</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f0;
        }

        /* Splash Screen Container */
        .splash-screen {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 850px;
            background: linear-gradient(145deg, #6A00FF 0%, #8B3DFF 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(106, 0, 255, 0.3);
            border-radius: 20px;
        }

        /* Efek dekoratif background */
        .splash-screen::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        .splash-screen::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Partikel dekoratif */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 6s ease-in-out infinite;
        }

        .particle-1 {
            width: 40px;
            height: 40px;
            top: 15%;
            left: 10%;
            animation-delay: 0s;
        }

        .particle-2 {
            width: 25px;
            height: 25px;
            bottom: 20%;
            right: 15%;
            animation-delay: 2s;
        }

        .particle-3 {
            width: 15px;
            height: 15px;
            top: 30%;
            right: 20%;
            animation-delay: 4s;
        }

        /* Logo Icon - TANPA FRAME PUTIH */
        .logo-icon-container {
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            animation: floatLogo 3s ease-in-out infinite;
        }

        .logo-icon {
            font-size: 90px;
            color: #FFFFFF;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        /* Welcome Text - Elegan */
        .welcome-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
        }

        /* Nama Aplikasi */
        .app-name {
            color: #FFFFFF;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .app-name span {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
        }

        /* Garis dekoratif di bawah nama */
        .divider {
            width: 60px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            margin: 8px 0 12px 0;
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        /* Tagline / Slogan */
        .tagline {
            color: rgba(255, 255, 255, 0.85);
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 35px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .tagline i {
            margin: 0 6px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Loading Bar */
        .loading-container {
            width: 220px;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            margin-top: 5px;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .loading-bar {
            height: 100%;
            background: #FFFFFF;
            border-radius: 10px;
            animation: loadingAnimation 2.5s ease-in-out infinite;
            width: 0%;
        }

        /* Loading Text */
        .loading-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 12px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out 1s both;
        }

        /* Versi Aplikasi */
        .version {
            position: absolute;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 1px;
            z-index: 1;
        }

        /* Animasi */
        @keyframes floatLogo {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-10px) rotate(2deg);
            }
        }

        @keyframes loadingAnimation {
            0% {
                width: 0%;
                margin-left: 0%;
            }
            50% {
                width: 70%;
                margin-left: 0%;
            }
            100% {
                width: 0%;
                margin-left: 100%;
            }
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(15px, -20px) scale(1.2);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive untuk layar kecil */
        @media (max-width: 480px) {
            .splash-screen {
                max-height: 100vh;
                border-radius: 0;
            }
            .app-name {
                font-size: 34px;
            }
            .logo-icon {
                font-size: 70px;
            }
            .loading-container {
                width: 180px;
            }
            .welcome-text {
                font-size: 12px;
                letter-spacing: 4px;
            }
            .tagline {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="splash-screen">
        <!-- Partikel dekoratif -->
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
        <div class="particle particle-3"></div>

        <!-- Logo Icon - Tabung Reaksi (Flask) warna putih, tanpa frame -->
        <div class="logo-icon-container">
            <i class="fas fa-flask logo-icon"></i>
        </div>

        <!-- Welcome Text - Elegan dan rapi -->
        <p class="welcome-text">Welcome to</p>

        <!-- Nama Aplikasi -->
        <h1 class="app-name">Nara<span>Lab</span></h1>

        <!-- Garis dekoratif -->
        <div class="divider"></div>

        <!-- Tagline -->
        <p class="tagline">
            <i class="fas fa-flask"></i> 
            Laboratorium Fisika 
            <i class="fas fa-flask"></i>
        </p>

        <!-- Loading Bar -->
        <div class="loading-container">
            <div class="loading-bar"></div>
        </div>

        <!-- Text loading -->
        <p class="loading-text">
            <i class="fas fa-circle-notch fa-spin" style="margin-right: 8px;"></i>
            Memuat...
        </p>

        <!-- Versi Aplikasi -->
        <span class="version">v2.1.0</span>
    </div>

    <!-- JavaScript untuk redirect setelah 5 detik -->
    <script>
        setTimeout(function() {
            window.location.href = 'login.html';
        }, 5000); // 5000 milidetik = 5 detik
    </script>

</body>
</html>
